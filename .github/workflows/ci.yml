name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # pi requires Node >=22.19.0 (bundled undici uses APIs absent in Node 20).
        node: ["22", "24"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # Installs pinned pi + @types/node + typescript from package.json.
      - name: Install dependencies
        run: npm install

      # Put the locally-installed pi binary on PATH for the test suite.
      - name: Expose pi on PATH
        run: echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Show pi version
        run: pi --version

      - name: Type-check extension
        run: npm run typecheck

      - name: Run test suite
        run: npm test
        env:
          # No API keys needed: the extension writes its output during the
          # session_start event and exits before any model call. PI_OFFLINE
          # keeps startup network work off so CI is fast and hermetic.
          PI_OFFLINE: "1"
